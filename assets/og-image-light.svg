<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="HarrisShutter light preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#edf3fb"/>
    </linearGradient>

    <circle id="mixLeft" cx="820" cy="376" r="120"/>
    <circle id="mixRight" cx="960" cy="376" r="120"/>
    <circle id="mixTop" cx="890" cy="256" r="120"/>

    <clipPath id="clipLeft"><use href="#mixLeft"/></clipPath>
    <clipPath id="clipRight"><use href="#mixRight"/></clipPath>
    <clipPath id="clipTop"><use href="#mixTop"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="68" y="58" width="1064" height="514" rx="22" fill="#ffffff" stroke="#cfd8e3"/>

  <text x="112" y="156" fill="#2f81f7" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">HarrisShutter</text>
  <text x="112" y="210" fill="#1e293b" font-size="45" font-family="Segoe UI, Arial, sans-serif">RGB/CYM channel fusion</text>
  <text x="112" y="264" fill="#1e293b" font-size="45" font-family="Segoe UI, Arial, sans-serif">image compositor</text>

  <g>
    <use href="#mixLeft" fill="#f85149"/>
    <use href="#mixRight" fill="#3fb950"/>
    <use href="#mixTop" fill="#2f81f7"/>

    <use href="#mixLeft" clip-path="url(#clipRight)" fill="#d29922"/>
    <use href="#mixLeft" clip-path="url(#clipTop)" fill="#bc8cff"/>
    <use href="#mixRight" clip-path="url(#clipTop)" fill="#79c0ff"/>

    <g clip-path="url(#clipLeft)">
      <g clip-path="url(#clipRight)">
        <use href="#mixTop" fill="#ffffff"/>
      </g>
    </g>
  </g>
</svg>
